<div aria-hidden="true" aria-label="Agrandissement d'image" class="lp-modal" id="lpImageModal" role="dialog">
<div class="lp-modal__backdrop" data-close="true"></div>
<div class="lp-modal__content" role="document">
<img alt="" class="lp-modal__img" id="lpImageModalImg" src=""/>
<div class="lp-modal__caption" id="lpImageModalCaption"></div>
</div>
</div>
<script>
(function () {
    const modal = document.getElementById('lpImageModal');
    const modalImg = document.getElementById('lpImageModalImg');
    const modalCaption = document.getElementById('lpImageModalCaption');

    if (!modal || !modalImg || !modalCaption) return;

    const closeModal = () => {
        modal.classList.remove('is-active');
        modal.setAttribute('aria-hidden', 'true');
        modalImg.src = '';
        modalImg.alt = '';
        modalCaption.textContent = '';
    };

    document.addEventListener('click', (event) => {
        const trigger = event.target.closest('.tier-item img');

        if (trigger) {
            event.preventDefault();
            modalImg.src = trigger.currentSrc || trigger.src;
            modalImg.alt = trigger.alt || '';
            modalCaption.textContent = trigger.alt || '';
            modal.classList.add('is-active');
            modal.setAttribute('aria-hidden', 'false');
            return;
        }

        if (event.target.classList.contains('lp-modal__backdrop') || event.target === modal) {
            closeModal();
        }
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeModal();
        }
    });
})();
</script>
