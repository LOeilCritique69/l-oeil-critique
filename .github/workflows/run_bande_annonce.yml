name: 🎬 MAJ Automatique — Bandes Annonces + Letterboxd

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'l_oeil_critique/scripts/scraper_bandes_annonces.py'
      - 'l_oeil_critique/movies/lb.py'
      - 'requirements.txt'
      - '.github/workflows/*.yml'

concurrency:
  group: media-update
  cancel-in-progress: true

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_2 }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: 🎭 Install Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: 🔍 Environment check
        run: |
          python --version
          pip --version

      # =========================
      # SCRAPER BANDES ANNONCES
      # =========================
      - name: 🎬 Run trailers scraper
        run: |
          echo "🚀 Scraper bandes annonces"
          python l_oeil_critique/scripts/scraper_bandes_annonces.py
          echo "✅ Done"

      # =========================
      # LETTERBOXD RSS
      # =========================
      - name: 🎞️ Run Letterboxd RSS (lb.py)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "🚀 Fetch Letterboxd RSS"
          python l_oeil_critique/movies/lb.py
          echo "✅ Letterboxd update done"

      # =========================
      # DETECT CHANGES
      # =========================
      - name: 📊 Check changes
        id: changes
        run: |
          git status --porcelain > changes.txt

          if [ -s changes.txt ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📌 Changes detected"
            cat changes.txt
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes"
          fi

      # =========================
      # CONFIG GIT
      # =========================
      - name: 🔧 Git config
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # =========================
      # COMMIT PUSH
      # =========================
      - name: 🔁 Commit & push
        if: steps.changes.outputs.changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🎬 Auto update media (#${{ github.run_number }})"
          branch: main
          file_pattern: "l_oeil_critique/scripts/*.json l_oeil_critique/scripts/*.log l_oeil_critique/movies/movies.json l_oeil_critique/movies/tmdb_cache.json bande_annonces_blocs.html bande_annonces_maj.html"

      # =========================
      # SUMMARY
      # =========================
      - name: 🧾 Summary
        if: always()
        run: |
          echo "## Workflow résumé" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes: ${{ steps.changes.outputs.changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      # =========================
      # FAIL LOGS
      # =========================
      - name: 📤 Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            l_oeil_critique/scripts/*.log
            l_oeil_critique/scripts/*.json
            l_oeil_critique/movies/*.log
          retention-days: 7

      - name: 🚨 Error
        if: failure()
        run: |
          echo "::error::Workflow failed"