name: 🎬 Auto Update — Bandes Annonces + Letterboxd

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'l_oeil_critique/scripts/**'
      - 'l_oeil_critique/movies/**'
      - 'requirements.txt'
      - '.github/workflows/**'

concurrency:
  group: media-update
  cancel-in-progress: true

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_2 }}
          fetch-depth: 0

      # =========================
      # PYTHON
      # =========================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =========================
      # DEPENDENCIES
      # =========================
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # =========================
      # PLAYWRIGHT
      # =========================
      - name: 🎭 Install Playwright
        run: |
          python -m playwright install --with-deps chromium

      # =========================
      # ENV CHECK
      # =========================
      - name: 🔍 Environment check
        run: |
          echo "Python version:"
          python --version

          echo ""
          echo "Pip version:"
          pip --version

          echo ""
          echo "Current directory:"
          pwd

          echo ""
          echo "Repository tree:"
          ls -R

      # =========================
      # SCRAPER BANDES ANNONCES
      # =========================
      - name: 🎬 Run trailers scraper
        run: |
          echo "🚀 Launching scraper..."
          python l_oeil_critique/scripts/scraper_bandes_annonces.py
          echo "✅ Scraper completed"

      # =========================
      # LETTERBOXD RSS
      # =========================
      - name: 🎞️ Run Letterboxd RSS
        run: |
          echo "🚀 Updating Letterboxd..."
          python l_oeil_critique/movies/lb.py
          echo "✅ Letterboxd update completed"

      # =========================
      # DETECT CHANGES
      # =========================
      - name: 📊 Detect repository changes
        id: changes
        run: |
          echo "Checking git changes..."

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT

            echo ""
            echo "✅ Changes detected:"
            git status --short
          else
            echo "changes=false" >> $GITHUB_OUTPUT

            echo ""
            echo "ℹ️ No changes detected"
          fi

      # =========================
      # GIT CONFIG
      # =========================
      - name: 🔧 Configure Git
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # =========================
      # COMMIT + PUSH
      # =========================
      - name: 🔁 Commit & Push
        if: steps.changes.outputs.changes == 'true'
        run: |
          echo "📦 Adding all files..."
          git add .

          echo "📝 Creating commit..."
          git commit -m "🎬 Auto update media (#${{ github.run_number }})"

          echo "🚀 Pushing to GitHub..."
          git push origin main

          echo "✅ Push completed"

      # =========================
      # SUMMARY
      # =========================
      - name: 🧾 Workflow summary
        if: always()
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes detected: ${{ steps.changes.outputs.changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      # =========================
      # UPLOAD LOGS IF FAILURE
      # =========================
      - name: 📤 Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            l_oeil_critique/scripts/*.log
            l_oeil_critique/scripts/*.json
            l_oeil_critique/movies/*.log
          retention-days: 7

      # =========================
      # FAILURE MESSAGE
      # =========================
      - name: 🚨 Workflow failed
        if: failure()
        run: |
          echo "::error::Workflow failed"