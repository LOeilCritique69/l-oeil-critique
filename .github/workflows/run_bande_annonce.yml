name: 🎬 Auto Update — Bandes Annonces + Letterboxd

on:
  schedule:
    # Heure FR actuelle (UTC+2)
    # 07h FR = 05h UTC
    # 13h FR = 11h UTC
    # 19h FR = 17h UTC

    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'

  workflow_dispatch:

concurrency:
  group: media-update
  cancel-in-progress: true

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_2 }}
          fetch-depth: 0

      # =========================
      # PYTHON
      # =========================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # =========================
      # INSTALL PLAYWRIGHT
      # =========================
      - name: 🎭 Install Playwright
        run: |
          python -m playwright install --with-deps chromium

      # =========================
      # ENVIRONMENT CHECK
      # =========================
      - name: 🔍 Environment check
        run: |
          echo "========== PYTHON =========="
          python --version

          echo ""
          echo "========== PIP =========="
          pip --version

          echo ""
          echo "========== CURRENT DIR =========="
          pwd

          echo ""
          echo "========== REPOSITORY TREE =========="
          ls -R

      # =========================
      # RUN TRAILERS SCRAPER
      # =========================
      - name: 🎬 Run trailers scraper
        run: |
          echo "🚀 Starting trailers scraper..."
          python l_oeil_critique/scripts/scraper_bandes_annonces.py
          echo "✅ Trailers scraper completed"

      # =========================
      # RUN LETTERBOXD
      # =========================
      - name: 🎞️ Run Letterboxd RSS
        run: |
          echo "🚀 Starting Letterboxd update..."
          python l_oeil_critique/movies/lb.py
          echo "✅ Letterboxd update completed"

      # =========================
      # CHECK FOR CHANGES
      # =========================
      - name: 📊 Detect repository changes
        id: changes
        run: |
          echo "🔍 Checking repository changes..."

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT

            echo ""
            echo "✅ Changes detected:"
            git status --short
          else
            echo "changes=false" >> $GITHUB_OUTPUT

            echo ""
            echo "ℹ️ No changes detected"
          fi

      # =========================
      # CONFIGURE GIT
      # =========================
      - name: 🔧 Configure Git
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # =========================
      # COMMIT + PUSH
      # =========================
      - name: 🔁 Commit and push changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          echo "📦 Adding all files..."
          git add .

          echo ""
          echo "📝 Creating commit..."
          git commit -m "🎬 Auto update media (#${{ github.run_number }})"

          echo ""
          echo "🚀 Pushing to GitHub..."
          git push origin main

          echo ""
          echo "✅ Push completed"

      # =========================
      # WORKFLOW SUMMARY
      # =========================
      - name: 🧾 Workflow summary
        if: always()
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes detected: ${{ steps.changes.outputs.changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      # =========================
      # UPLOAD LOGS IF FAILURE
      # =========================
      - name: 📤 Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            l_oeil_critique/scripts/*.log
            l_oeil_critique/scripts/*.json
            l_oeil_critique/movies/*.log
          retention-days: 7

      # =========================
      # FAILURE MESSAGE
      # =========================
      - name: 🚨 Workflow failed
        if: failure()
        run: |
          echo "::error::Workflow failed"