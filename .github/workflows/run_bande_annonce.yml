name: 🎬 Auto Update — Bandes Annonces + Letterboxd

on:
  schedule:
    - cron: '0 * * * *'  # toutes les heures (minute 0)

  workflow_dispatch:

concurrency:
  group: media-update
  cancel-in-progress: true

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_2 }}
          fetch-depth: 0

      # =========================
      # PYTHON
      # =========================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # =========================
      # PLAYWRIGHT
      # =========================
      - name: 🎭 Install Playwright
        run: |
          python -m playwright install --with-deps chromium

      # =========================
      # DEBUG BEFORE
      # =========================
      - name: 🔍 BEFORE run state
        run: |
          echo "=== BEFORE ==="
          git status
          ls -R l_oeil_critique || true

      # =========================
      # SCRAPER
      # =========================
      - name: 🎬 Run trailers scraper
        run: |
          python l_oeil_critique/scripts/scraper_bandes_annonces.py

      # =========================
      # LETTERBOXD
      # =========================
      - name: 🎞️ Run Letterboxd RSS
        run: |
          python l_oeil_critique/movies/lb.py

      # =========================
      # IMAGE OPTIMIZATION
      # =========================
      - name: 🖼️ Optimize images
        run: |
          python l_oeil_critique/scripts/optimize_images.py

      # =========================
      # SITEMAP
      # =========================
      - name: 🗺️ Generate sitemap
        run: |
          python l_oeil_critique/scripts/sitemap_generator.py

      # =========================
      # DEBUG AFTER
      # =========================
      - name: 🔍 AFTER run state
        run: |
          echo "=== AFTER ==="
          git status
          git diff --name-only || true

      # =========================
      # DETECT CHANGES
      # =========================
      - name: 📊 Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "CHANGES FOUND"
            git status --short
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "NO CHANGES"
          fi

      # =========================
      # GIT CONFIG
      # =========================
      - name: 🔧 Git config
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # =========================
      # COMMIT
      # =========================
      - name: 🔁 Commit & push
        if: steps.changes.outputs.changes == 'true'
        run: |
          git add .
          git commit -m "🎬 Auto update media (#${{ github.run_number }})"
          git push origin main

      # =========================
      # SUMMARY
      # =========================
      - name: 🧾 Summary
        if: always()
        run: |
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes: ${{ steps.changes.outputs.changes }}" >> $GITHUB_STEP_SUMMARY

      # =========================
      # ERROR LOGS
      # =========================
      - name: 📤 Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            l_oeil_critique/scripts/*.log
            l_oeil_critique/scripts/*.json
            l_oeil_critique/movies/*.log