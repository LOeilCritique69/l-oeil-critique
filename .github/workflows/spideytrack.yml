name: 🕷️ SpideyTrack — Daily Guess

on:
  schedule:
    - cron: '0 2 * * *' # Tous les jours à 02:00 UTC

  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-guess:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_2 }}
          fetch-depth: 0

      # =========================
      # PYTHON
      # =========================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      # =========================
      # RUN SPIDEYTRACK
      # =========================
      - name: 🕷️ Run daily guess
        run: |
          python l_oeil_critique/Spideytrack/Marveldle/tweet.py

      # =========================
      # DETECT CHANGES
      # =========================
      - name: 📊 Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            git status --short
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      # =========================
      # GIT CONFIG
      # =========================
      - name: 🔧 Git config
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config user.name "SpideyTrack Bot"
          git config user.email "bot@spideytrack.com"

      # =========================
      # COMMIT & PUSH
      # =========================
      - name: 🚀 Commit & push
        if: steps.changes.outputs.changes == 'true'
        run: |
          git add l_oeil_critique/Spideytrack/Marveldle/marveldle/results.json
          git add l_oeil_critique/Spideytrack/Marveldle/marveldle/results_andrew.json
          git add l_oeil_critique/Spideytrack/Marveldle/marveldle/results_tobey.json

          git add l_oeil_critique/Spideytrack/Marveldle/marveldle/images/
          git add l_oeil_critique/Spideytrack/Marveldle/marveldle/images_andrew/
          git add l_oeil_critique/Spideytrack/Marveldle/marveldle/images_tobey/

          git add l_oeil_critique/Spideytrack/Marveldle/day.txt
          git add l_oeil_critique/Spideytrack/Marveldle/day-andrew.txt
          git add l_oeil_critique/Spideytrack/Marveldle/day_tobey.txt

          git commit -m "🕷️ SpideyTrack Day $(cat l_oeil_critique/Spideytrack/Marveldle/day.txt) - $(date '+%Y-%m-%d')" || exit 0
          git push origin main

      # =========================
      # SUMMARY
      # =========================
      - name: 🧾 Summary
        if: always()
        run: |
          echo "## SpideyTrack" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes: ${{ steps.changes.outputs.changes }}" >> $GITHUB_STEP_SUMMARY